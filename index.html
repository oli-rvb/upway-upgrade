<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>compare.html — upway.fr</title>
<link rel="shortcut icon" href="./upway_files/logo-256_32x32.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0a0a;
    --bg-1: #161616;
    --fg-0: #e8e8e8;
    --fg-1: #8a8a8a;
    --fg-2: #4a4a4a;
    --border: #222;
    --accent: #fff;
    --live: #5eff8a;
    --toolbar-h: 36px;
    --divider: 4px;
    --split-ratio: 0.5;
    --mono: "IBM Plex Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: var(--mono);
    color: var(--fg-0);
    background: #000;
    -webkit-font-smoothing: antialiased;
  }

  /* Toolbar — terminal status bar aesthetic */
  .toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--toolbar-h);
    display: flex;
    align-items: stretch;
    padding: 0;
    background: var(--bg-0);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    font-family: var(--mono);
    user-select: none;
  }

  .toolbar > * {
    display: inline-flex;
    align-items: center;
  }

  .brand {
    padding: 0 14px 0 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--fg-0);
    letter-spacing: 0.04em;
    border-right: 1px solid var(--border);
    gap: 8px;
  }
  .brand .marker {
    color: var(--accent);
    font-weight: 600;
  }

  .grp {
    padding: 0 12px;
    gap: 10px;
    border-right: 1px solid var(--border);
  }

  .label {
    font-size: 10px;
    font-weight: 500;
    color: var(--fg-1);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .seg {
    display: inline-flex;
    border: 1px solid var(--border);
    background: transparent;
  }
  .seg button {
    border: 0;
    border-left: 1px solid var(--border);
    background: transparent;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-0);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    line-height: 1.4;
  }
  .seg button:first-child { border-left: 0; }
  .seg button:hover { background: var(--bg-1); }
  .seg button.active {
    background: var(--accent);
    color: #000;
  }
  .seg button.active:hover { background: var(--accent); }
  .seg button:disabled {
    color: var(--fg-2);
    cursor: not-allowed;
  }
  .seg button:disabled:hover { background: transparent; }

  /* Glyph buttons (axis indicators) get slightly more padding */
  .seg button.glyph {
    padding: 4px 12px;
    font-size: 13px;
    letter-spacing: 0;
  }

  .meta {
    padding: 0 12px;
    gap: 14px;
    color: var(--fg-0);
    font-size: 11px;
    letter-spacing: 0.02em;
    border-right: 1px solid var(--border);
  }
  .meta .pair { display: inline-flex; gap: 4px; }
  .meta .k { color: var(--fg-1); }
  .meta .v { color: var(--fg-0); }

  .status {
    flex: 1 1 auto;
    padding: 0 16px;
    font-size: 11px;
    color: var(--fg-0);
    letter-spacing: 0.02em;
    line-height: 1.35;
  }

  /* Container & panes */
  .container {
    position: fixed;
    top: var(--toolbar-h);
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    background: #000;
  }
  .container.mode-split-v { flex-direction: row; }
  .container.mode-split-h { flex-direction: column; }
  .container.mode-only-left  { flex-direction: row; }
  .container.mode-only-right { flex-direction: row; }

  .pane {
    border: 0;
    background: #fff;
    display: block;
    min-width: 0;
    min-height: 0;
  }

  /* Split sizing via --split-ratio */
  .container.mode-split-v .pane-left,
  .container.mode-split-h .pane-left {
    flex: var(--split-ratio) 1 0;
    min-width: 0;
    min-height: 0;
  }
  .container.mode-split-v .pane-right,
  .container.mode-split-h .pane-right {
    flex: calc(1 - var(--split-ratio)) 1 0;
    min-width: 0;
    min-height: 0;
  }

  /* Single-pane modes */
  .container.mode-only-left  .pane-right,
  .container.mode-only-left  .divider,
  .container.mode-only-right .pane-left,
  .container.mode-only-right .divider {
    display: none;
  }
  .container.mode-only-left  .pane-left,
  .container.mode-only-right .pane-right {
    flex: 1 1 100%;
  }

  /* Divider — hairline that lights up on interaction */
  .divider {
    flex: 0 0 var(--divider);
    background: #1a1a1a;
    position: relative;
    transition: background 0.1s;
    touch-action: none;
  }
  .divider::after {
    content: "";
    position: absolute;
    background: transparent;
  }
  .container.mode-split-v .divider {
    cursor: col-resize;
  }
  .container.mode-split-v .divider::after {
    top: 0; bottom: 0;
    left: -4px; right: -4px;
  }
  .container.mode-split-h .divider {
    cursor: row-resize;
  }
  .container.mode-split-h .divider::after {
    left: 0; right: 0;
    top: -4px; bottom: -4px;
  }
  .divider:hover, .divider.dragging {
    background: var(--fg-0);
  }

  /* During drag, block iframe pointer events so the cursor doesn't get captured */
  .container.dragging .pane { pointer-events: none; }
  .container.dragging { user-select: none; }

  /* Responsive: narrow viewport — collapse status sentence then labels */
  @media (max-width: 820px) {
    .status { display: none; }
  }
  @media (max-width: 640px) {
    .brand { padding: 0 10px; font-size: 11px; }
    .grp { padding: 0 8px; gap: 6px; }
    .label { display: none; }
    .status { padding: 0 10px; }
    .seg button { padding: 4px 7px; }
  }
</style>
</head>
<body>

<div class="toolbar" role="toolbar" aria-label="Comparison controls">
  <span class="brand">
    <span class="marker">▌</span>Upway Upgrade
  </span>

  <div class="grp">
    <span class="label">view</span>
    <div class="seg" id="mode-seg" role="group" aria-label="View mode">
      <button data-mode="only-left">L</button>
      <button data-mode="split">L+R</button>
      <button data-mode="only-right" class="active">R</button>
    </div>
  </div>

  <div class="grp" id="orient-grp">
    <span class="label" id="orient-label">axis</span>
    <div class="seg" id="orient-seg" role="group" aria-label="Split orientation">
      <button data-orient="v" class="active glyph" title="side-by-side">│</button>
      <button data-orient="h" class="glyph" title="stacked">─</button>
    </div>
  </div>

  <div class="status" role="note">
    Original Upway homepage (L) is overwhelming and unclear. On the right (R), my design taste.
  </div>
</div>

<div class="container mode-only-right" id="container">
  <iframe class="pane pane-left"  id="pane-left"  src="./upway.html"          title="Original Upway"  loading="eager"></iframe>
  <div class="divider" id="divider" role="separator" aria-orientation="vertical" aria-label="Resize panes"></div>
  <iframe class="pane pane-right" id="pane-right" src="./site/ebikeshop.html" title="Upway upgrade"   loading="eager"></iframe>
</div>

<script>
(function () {
  const container   = document.getElementById('container');
  const divider     = document.getElementById('divider');
  const modeSeg     = document.getElementById('mode-seg');
  const orientSeg   = document.getElementById('orient-seg');
  const orientLabel = document.getElementById('orient-label');

  const STORAGE_KEY = 'upway-compare-state';
  const MOBILE_BREAKPOINT = 700;

  const state = {
    mode: 'only-right',  // 'split' | 'only-left' | 'only-right'
    orientation: 'v',    // 'v' | 'h'
    ratio: 0.5,
  };

  // Restore from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (saved.mode)        state.mode = saved.mode;
    if (saved.orientation) state.orientation = saved.orientation;
    if (typeof saved.ratio === 'number') state.ratio = saved.ratio;
  } catch (_) { /* ignore */ }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
  }

  function isNarrow() {
    return window.innerWidth < MOBILE_BREAKPOINT;
  }

  function applyState() {
    // Force horizontal on narrow viewports
    const effectiveOrient = isNarrow() ? 'h' : state.orientation;

    container.classList.remove('mode-split-v', 'mode-split-h', 'mode-only-left', 'mode-only-right');
    if (state.mode === 'split') {
      container.classList.add(effectiveOrient === 'h' ? 'mode-split-h' : 'mode-split-v');
    } else {
      container.classList.add('mode-' + state.mode);
    }
    container.style.setProperty('--split-ratio', state.ratio);

    divider.setAttribute('aria-orientation', effectiveOrient === 'h' ? 'horizontal' : 'vertical');

    // Update toolbar visuals
    modeSeg.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === state.mode);
    });
    orientSeg.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', state.mode === 'split' && b.dataset.orient === effectiveOrient);
    });

    const splitActive = state.mode === 'split';
    const lockOrient  = isNarrow();
    orientSeg.querySelectorAll('button').forEach(b => {
      b.disabled = !splitActive || lockOrient;
    });
    orientLabel.style.opacity = splitActive && !lockOrient ? '1' : '0.4';
  }

  // Toolbar wiring
  modeSeg.addEventListener('click', e => {
    const btn = e.target.closest('button[data-mode]');
    if (!btn) return;
    state.mode = btn.dataset.mode;
    applyState();
    persist();
  });

  orientSeg.addEventListener('click', e => {
    const btn = e.target.closest('button[data-orient]');
    if (!btn || btn.disabled) return;
    state.orientation = btn.dataset.orient;
    applyState();
    persist();
  });

  // Drag-to-resize divider
  let dragging = false;

  function startDrag(e) {
    if (state.mode !== 'split') return;
    dragging = true;
    container.classList.add('dragging');
    divider.classList.add('dragging');
    e.preventDefault();
  }

  function moveDrag(e) {
    if (!dragging) return;
    const point = e.touches ? e.touches[0] : e;
    const rect = container.getBoundingClientRect();
    const effectiveOrient = isNarrow() ? 'h' : state.orientation;
    let ratio;
    if (effectiveOrient === 'h') {
      ratio = (point.clientY - rect.top) / rect.height;
    } else {
      ratio = (point.clientX - rect.left) / rect.width;
    }
    ratio = Math.max(0.05, Math.min(0.95, ratio));
    state.ratio = ratio;
    container.style.setProperty('--split-ratio', ratio);
  }

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    container.classList.remove('dragging');
    divider.classList.remove('dragging');
    persist();
  }

  divider.addEventListener('mousedown', startDrag);
  divider.addEventListener('touchstart', startDrag, { passive: false });
  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('touchmove', moveDrag, { passive: false });
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
  document.addEventListener('touchcancel', endDrag);

  // React to viewport changes (mobile orientation lock)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(applyState, 100);
  });

  applyState();
})();
</script>

</body>
</html>
