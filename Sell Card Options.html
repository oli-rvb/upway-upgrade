<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Card — Options</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  
  /* Shared card shell */
  .card-shell {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    color: #fff;
    text-decoration: none;
    box-sizing: border-box;
  }

  /* =========== OPTION A: Full image cover =========== */
  .opt-a {
    background: #4733FF;
  }
  .opt-a .bg-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
    z-index: 0;
  }

  /* =========== OPTION B: Desktop banner (wide) =========== */
  .opt-b {
    background: #4733FF;
    align-items: center;
    justify-content: center;
  }
  .opt-b .bg-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: left center;
    z-index: 0;
  }

  /* =========== OPTION C: HTML recreation =========== */
  .opt-c {
    background: linear-gradient(135deg, #4733FF 0%, #3522e0 100%);
    padding: 28px;
    flex-direction: column;
    justify-content: space-between;
  }
  .opt-c .c-content { position: relative; z-index: 2; max-width: 65%; }
  .opt-c h2 {
    font-family: 'Gradient Premium','Gradient_Premium', system-ui;
    font-size: 26px; font-weight: 800; margin: 0 0 14px;
    line-height: 1.1; text-transform: uppercase; letter-spacing: -.01em;
  }
  .opt-c .c-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .opt-c .c-list li {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; font-weight: 500; line-height: 1.3;
  }
  .opt-c .c-list .c-icon {
    flex-shrink: 0; width: 28px; height: 28px;
    background: rgba(255,255,255,.15); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .opt-c .c-cta {
    position: relative; z-index: 2;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px; background: #fff; color: #1c1535;
    border-radius: 999px; font-weight: 600; font-size: 14px;
    text-decoration: none; width: fit-content; border: none; cursor: pointer;
  }
  .opt-c .c-bike {
    position: absolute; right: -20px; bottom: -10px;
    width: 50%; max-width: 220px; z-index: 1;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,.25));
  }

  /* =========== OPTION D: Split layout =========== */
  .opt-d {
    background: linear-gradient(135deg, #FF8A57 0%, #ff5e2c 100%);
    flex-direction: row;
  }
  .opt-d .d-left {
    flex: 1; padding: 28px; display: flex; flex-direction: column;
    justify-content: space-between; z-index: 2;
  }
  .opt-d h2 {
    font-family: 'Gradient Premium','Gradient_Premium', system-ui;
    font-size: 24px; font-weight: 800; margin: 0 0 12px;
    line-height: 1.1; letter-spacing: -.01em;
  }
  .opt-d .d-list { list-style: none; padding: 0; margin: 0 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .opt-d .d-list li { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
  .opt-d .d-list svg { flex-shrink: 0; }
  .opt-d .d-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px; background: #fff; color: #1c1535;
    border-radius: 999px; font-weight: 600; font-size: 14px;
    text-decoration: none; width: fit-content; border: none; cursor: pointer;
  }
  .opt-d .d-right {
    width: 45%; position: relative; overflow: hidden;
  }
  .opt-d .d-right img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center;
  }

  /* =========== OPTION E: Contained image, purple bg, padded =========== */
  .opt-e {
    background: #4733FF;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .opt-e .bg-img {
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center center;
    z-index: 0;
    border-radius: 8px;
  }

  /* =========== OPTION F: HTML recreation — dark bg with photo =========== */
  .opt-f {
    background: #0f1b3a;
    padding: 0;
  }
  .opt-f .f-photo {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    opacity: .3; z-index: 0;
  }
  .opt-f::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(120deg, rgba(71,51,255,.85) 0%, rgba(71,51,255,.4) 70%);
    z-index: 1;
  }
  .opt-f .f-content {
    position: relative; z-index: 2;
    padding: 28px; display: flex; flex-direction: column;
    justify-content: space-between; height: 100%; box-sizing: border-box;
  }
  .opt-f h2 {
    font-family: 'Gradient Premium','Gradient_Premium', system-ui;
    font-size: 26px; font-weight: 800; margin: 0 0 14px;
    line-height: 1.1; text-transform: uppercase;
  }
  .opt-f .f-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .opt-f .f-list li { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
  .opt-f .f-list .f-icon {
    flex-shrink: 0; width: 28px; height: 28px;
    background: rgba(255,255,255,.15); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .opt-f .f-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px; background: #FF8A57; color: #fff;
    border-radius: 999px; font-weight: 600; font-size: 14px;
    text-decoration: none; width: fit-content; border: none; cursor: pointer;
  }
</style>
</head>
<body>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

const CheckSvg = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
);
const ArrowSvg = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
);
const SpeedIcon = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
);
const TruckIcon = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
);
const WalletIcon = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="15" r="1"/></svg>
);

function App() {
  return (
    <DesignCanvas title="Carte 'Vendre mon vélo' — Options">
      <DCSection id="sell-options" title="Options pour la carte Vendre">

        {/* Option A: Mobile image as cover, cropped top */}
        <DCArtboard id="opt-a" label="A — Image mobile (cover)" width={440} height={260}>
          <div className="card-shell opt-a">
            <img className="bg-img" src="./site/ebikeshop_files/Mobile - Mamoun Version.jpg" alt="" />
          </div>
        </DCArtboard>

        {/* Option B: Desktop banner */}
        <DCArtboard id="opt-b" label="B — Bannière desktop" width={440} height={260}>
          <div className="card-shell opt-b">
            <img className="bg-img" src="./site/ebikeshop_files/FR - header Sell ur ebike HP.png" alt="" />
          </div>
        </DCArtboard>

        {/* Option C: HTML recreation purple + bike cutout */}
        <DCArtboard id="opt-c" label="C — HTML violet + vélo" width={440} height={260}>
          <div className="card-shell opt-c">
            <img className="c-bike" src="./site/ebikeshop_files/City.png" alt="" />
            <div className="c-content">
              <h2>Vendre votre vélo, c'est facile !</h2>
              <ul className="c-list">
                <li><span className="c-icon"><SpeedIcon /></span>Offre sous 48h</li>
                <li><span className="c-icon"><TruckIcon /></span>Expédition gratuite</li>
                <li><span className="c-icon"><WalletIcon /></span>Paiement en 3-5 jours</li>
              </ul>
            </div>
            <button className="c-cta">Je revends <ArrowSvg /></button>
          </div>
        </DCArtboard>

        {/* Option D: Split — text left, photo right */}
        <DCArtboard id="opt-d" label="D — Split texte + photo" width={440} height={260}>
          <div className="card-shell opt-d">
            <div className="d-left">
              <div>
                <h2>Vendre votre vélo, c'est facile !</h2>
                <ul className="d-list">
                  <li><CheckSvg /> Offre sous 48h</li>
                  <li><CheckSvg /> Expédition gratuite</li>
                  <li><CheckSvg /> Paiement en 3-5 jours</li>
                </ul>
              </div>
              <button className="d-cta">Je revends <ArrowSvg /></button>
            </div>
            <div className="d-right">
              <img src="./site/ebikeshop_files/Frame 1166.png" alt="" />
            </div>
          </div>
        </DCArtboard>

        {/* Option E: Contained image with padding */}
        <DCArtboard id="opt-e" label="E — Image contenue + marge" width={440} height={260}>
          <div className="card-shell opt-e">
            <img className="bg-img" src="./site/ebikeshop_files/Mobile - Mamoun Version.jpg" alt="" />
          </div>
        </DCArtboard>

        {/* Option F: Photo bg + purple overlay + HTML text */}
        <DCArtboard id="opt-f" label="F — Photo + overlay violet" width={440} height={260}>
          <div className="card-shell opt-f">
            <img className="f-photo" src="./site/ebikeshop_files/Frame 1166.png" alt="" />
            <div className="f-content">
              <div>
                <h2>Vendre votre vélo, c'est facile !</h2>
                <ul className="f-list">
                  <li><span className="f-icon"><SpeedIcon /></span>Offre sous 48h</li>
                  <li><span className="f-icon"><TruckIcon /></span>Expédition gratuite</li>
                  <li><span className="f-icon"><WalletIcon /></span>Paiement en 3-5 jours</li>
                </ul>
              </div>
              <button className="f-cta">Je revends <ArrowSvg /></button>
            </div>
          </div>
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
